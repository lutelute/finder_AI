<?xml version="1.0" encoding="UTF-8"?>
<!--
  Alternative 1.2x-height app icon retained for design comparison.
  The shipped icon remains AppIcon.svg; scripts/build-icon.sh does not render
  this candidate.

  FinderAI Workspace app icon.

  Two ideas only — a folder, and a shell prompt on it — because the icon has to
  survive being drawn at 16pt in a Dock or a Finder list. An earlier attempt drew
  the whole window (sidebar, file rows, drawer) and turned to mush below 64pt,
  so everything that could not be read at thumbnail size is gone.

  Colours come from IntegratedPanelTheme so the icon matches the window:
  #181818 shell, #007ACC accent, and the same green the terminal prompt uses.

  The art stays inside the 824pt squircle Apple centres in a 1024pt canvas; the
  surrounding margin is the system's shadow room, not spare space.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33333A"/>
      <stop offset="0.55" stop-color="#202024"/>
      <stop offset="1" stop-color="#161618"/>
    </linearGradient>
    <linearGradient id="folderBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6FBCF7"/>
      <stop offset="1" stop-color="#3E9AE8"/>
    </linearGradient>
    <linearGradient id="folderFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46A8F5"/>
      <stop offset="0.55" stop-color="#2489DB"/>
      <stop offset="1" stop-color="#0B68B9"/>
    </linearGradient>
    <linearGradient id="folderSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.22" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!--
      Fades out well before the shell's lower edge. An ellipse was used here
      first, but its rim stayed partly opaque at the sides and read as a hard arc
      drawn across the icon.
    -->
    <linearGradient id="topLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="0.75" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!--
      macOS icon grid: an 824pt rounded square centred in 1024pt, corner radius
      185.4. Drawing this with four bezier curves produced a circle instead of a
      squircle, so it is a plain rounded rect.
    -->
    <clipPath id="squircle">
      <rect x="100" y="100" width="824" height="824" rx="185.4" ry="185.4"/>
    </clipPath>
    <clipPath id="folderFaceClip">
      <path d="M252 356
               h520
               a64 64 0 0 1 64 64
               v288
               a64 64 0 0 1 -64 64
               H252
               a64 64 0 0 1 -64 -64
               V420
               a64 64 0 0 1 64 -64 Z"/>
    </clipPath>
    <filter id="folderShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18"
                    flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect x="100" y="100" width="824" height="824" rx="185.4" ry="185.4" fill="url(#shell)"/>

  <!-- Glass highlight across the top of the shell -->
  <g clip-path="url(#squircle)">
    <rect x="100" y="100" width="824" height="824" fill="url(#topLight)"/>
  </g>

  <g filter="url(#folderShadow)">
    <!--
      Taller back panel and tab. The previous folder was 672x400 overall and
      its face only 288pt high, which made the whole mark look compressed.
    -->
    <path d="M252 304
             a64 64 0 0 1 64 -64
             h132
             a44 44 0 0 1 33 15
             l57 78
             h234
             a64 64 0 0 1 64 64
             v23
             H252 Z"
          fill="url(#folderBack)"/>

    <!-- Folder front face: 648x416, 1.2x taller than the first revision. -->
    <path d="M252 356
             h520
             a64 64 0 0 1 64 64
             v288
             a64 64 0 0 1 -64 64
             H252
             a64 64 0 0 1 -64 -64
             V420
             a64 64 0 0 1 64 -64 Z"
          fill="url(#folderFace)"/>

    <!-- A soft top-plane highlight keeps the taller face from reading flat. -->
    <rect x="188" y="356" width="648" height="416"
          clip-path="url(#folderFaceClip)" fill="url(#folderSheen)"/>
  </g>

  <!--
    Accent seam where the drawer meets the list in the real window. Inset to the
    folder's own corner radius so it cannot poke out past the face.
  -->
  <rect x="252" y="356" width="520" height="7" fill="#007ACC" opacity="0.9"/>

  <!-- Shell prompt: the half that is not a file browser -->
  <path d="M320 468 l92 80 l-92 80"
        fill="none" stroke="#2BD048" stroke-width="36"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="464" y="614" width="196" height="32" rx="16" fill="#FFFFFF"/>
</svg>
