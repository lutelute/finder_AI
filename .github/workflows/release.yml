name: Release notarized FinderAI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version already committed in Workspace-Info.plist (for example 1.7.0)
        required: true
        type: string
      release_notes:
        description: Markdown release notes
        required: true
        type: string
      legacy_update_tested:
        description: Confirm an actual Sparkle update from public 1.2.2 was tested
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: finderai-production-release
  cancel-in-progress: false

jobs:
  release:
    name: Sign, notarize, and publish
    runs-on: macos-26
    environment: production-release
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      FINDERAI_CONFIRMED_LEGACY_UPDATE_TEST: ${{ inputs.legacy_update_tested && '1' || '0' }}
      DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
      NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
      FINDERAI_NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      FINDERAI_NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}

    steps:
      - name: Check out the exact main commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: main

      - name: Reject missing secrets or untested legacy migration
        shell: bash
        run: |
          set -euo pipefail
          [[ "$FINDERAI_CONFIRMED_LEGACY_UPDATE_TEST" == 1 ]] || {
            echo "Test the 1.2.2 -> $RELEASE_VERSION Sparkle migration first." >&2
            exit 1
          }
          for name in DEVELOPER_ID_P12_BASE64 DEVELOPER_ID_P12_PASSWORD \
            NOTARY_KEY_P8_BASE64 FINDERAI_NOTARY_KEY_ID SPARKLE_PRIVATE_KEY; do
            [[ -n "${!name:-}" ]] || { echo "Missing release secret: $name" >&2; exit 1; }
          done

      - name: Import Developer ID certificate and release keys
        shell: bash
        run: |
          set -euo pipefail
          signing_keychain="$RUNNER_TEMP/finderai-signing.keychain-db"
          signing_password="$(openssl rand -hex 24)"
          p12_path="$RUNNER_TEMP/developer-id.p12"
          notary_key="$RUNNER_TEMP/AuthKey.p8"
          sparkle_key="$RUNNER_TEMP/sparkle-private-key"
          echo "FINDERAI_SIGNING_KEYCHAIN=$signing_keychain" >> "$GITHUB_ENV"

          printf '%s' "$DEVELOPER_ID_P12_BASE64" | /usr/bin/base64 -D > "$p12_path"
          printf '%s' "$NOTARY_KEY_P8_BASE64" | /usr/bin/base64 -D > "$notary_key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$sparkle_key"
          chmod 600 "$p12_path" "$notary_key" "$sparkle_key"

          security create-keychain -p "$signing_password" "$signing_keychain"
          security set-keychain-settings -lut 21600 "$signing_keychain"
          security unlock-keychain -p "$signing_password" "$signing_keychain"
          security import "$p12_path" -k "$signing_keychain" \
            -P "$DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$signing_password" "$signing_keychain"
          security list-keychains -d user -s "$signing_keychain"

          identity=$(security find-identity -v -p codesigning "$signing_keychain" |
            sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -1)
          [[ -n "$identity" ]] || { echo "P12 has no Developer ID Application identity." >&2; exit 1; }

          {
            echo "FINDERAI_SIGN_IDENTITY=$identity"
            echo "FINDERAI_NOTARY_KEY=$notary_key"
            echo "SPARKLE_PRIVATE_KEY_FILE=$sparkle_key"
          } >> "$GITHUB_ENV"

      - name: Build, notarize, and publish protected release
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' "$RELEASE_NOTES" > "$notes_file"
          ./scripts/release.sh "$RELEASE_VERSION" "$notes_file"

      - name: Preserve notarization audit when publishing fails
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: finderai-notarization-audit
          path: |
            dist/notarization-result.plist
            dist/notarization-log.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Remove temporary credentials
        if: always()
        shell: bash
        run: |
          if [[ -n "${FINDERAI_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$FINDERAI_SIGNING_KEYCHAIN" 2>/dev/null || true
          fi
          rm -f "$RUNNER_TEMP/developer-id.p12" "$RUNNER_TEMP/AuthKey.p8" \
            "$RUNNER_TEMP/sparkle-private-key"
